name: Update Asana tracker data

on:
  schedule:
    # Every 15 minutes. GitHub may delay this slightly under load —
    # that's normal, not a bug.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest status from Asana
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ASANA_PROJECT_GID: '1216025748684923'
        run: node scripts/fetch-asana.js

      - name: Commit data.json if it changed
        run: |
          git config user.name "asana-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: refresh tracker data"
          git push
